# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
 paths:
   include:
     - worker/*

pool:
 vmImage: ubuntu-latest

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: BuildandPush
  displayName: BuildandPush

  jobs:
  - job: BuildandPush
    displayName: Build and Push

    steps:
    # Login to Docker Hub
    - task: Docker@2
      displayName: Login to Docker Hub
      inputs:
        containerRegistry: 'dockerhub-conn'
        command: 'login'

    - task: Docker@2
      displayName: Build an image
      inputs:
        containerRegistry: 'dockerhub-conn'
        repository: 'docker1saimanu/voting-app-worker'
        command: 'build'
        Dockerfile: 'worker/Dockerfile'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: Push image
      inputs:
        containerRegistry: 'dockerhub-conn'
        repository: 'docker1saimanu/voting-app-worker'
        command: 'push'
        tags: |
          $(tag)
          latest
